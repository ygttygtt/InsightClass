<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsightClass - 训练结果查看器</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ---- header ---- */
.header {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  background: #1e293b; border-bottom: 1px solid #334155;
}
.header h1 { font-size: 20px; white-space: nowrap; }
.header .subtitle { font-weight: 400; color: #94a3b8; font-size: 14px; margin-left: 4px; }

/* ---- layout ---- */
.layout { display: flex; height: calc(100vh - 57px); }

/* ---- sidebar ---- */
.sidebar {
  width: 280px; min-width: 280px;
  background: #1e293b; border-right: 1px solid #334155;
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.sidebar-title {
  padding: 14px 16px 10px;
  font-size: 13px; font-weight: 600; color: #94a3b8;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.exp-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
.exp-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 10px; border-radius: 6px; cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.exp-item:hover { background: #334155; }
.exp-item.selected { background: #1e3a5f; border: 1px solid #2563eb; }
.exp-item input[type=checkbox] { margin-top: 3px; accent-color: #38bdf8; flex-shrink: 0; }
.exp-item .exp-info { flex: 1; min-width: 0; }
.exp-item .exp-name { font-size: 13px; font-weight: 500; word-break: break-all; }
.exp-item .exp-meta { font-size: 11px; color: #64748b; margin-top: 2px; }

/* ---- main ---- */
.main { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

/* ---- cards row ---- */
.cards-row { display: flex; gap: 12px; flex-wrap: wrap; }
.info-card {
  background: #1e293b; border: 1px solid #334155; border-radius: 8px;
  padding: 14px 18px; min-width: 200px; flex: 1;
}
.info-card .card-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.info-card .card-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
.info-card .card-detail { font-size: 12px; color: #94a3b8; margin-top: 4px; }

/* ---- section ---- */
.section {
  background: #1e293b; border: 1px solid #334155; border-radius: 8px;
  padding: 18px;
}
.section-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #cbd5e1; }

/* ---- chart ---- */
.chart-container { position: relative; height: 320px; }
.chart-container canvas { width: 100% !important; }

/* ---- confusion matrix ---- */
.cm-grid { display: flex; gap: 16px; flex-wrap: wrap; }
.cm-card { text-align: center; }
.cm-card .cm-label { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
.cm-card img {
  max-width: 400px; width: 100%; border-radius: 6px;
  border: 1px solid #334155;
}

/* ---- hyperparameters table ---- */
.params-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}
.param-item {
  display: flex; justify-content: space-between; gap: 8px;
  padding: 6px 10px; background: #0f172a; border-radius: 4px; font-size: 13px;
}
.param-key { color: #94a3b8; }
.param-val { color: #e2e8f0; font-weight: 500; font-variant-numeric: tabular-nums; text-align: right; }

/* ---- empty state ---- */
.empty-state {
  display: flex; align-items: center; justify-content: center;
  flex: 1; color: #64748b; font-size: 15px; text-align: center; padding: 60px;
}

/* ---- controls ---- */
.chart-controls {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.chart-btn {
  padding: 5px 14px; border: 1px solid #475569; border-radius: 4px;
  background: transparent; color: #94a3b8; cursor: pointer; font-size: 12px;
  transition: all 0.15s;
}
.chart-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
.chart-btn:hover:not(.active) { background: #334155; }

/* ---- scrollbar ---- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #64748b; }
</style>
</head>
<body>

<div class="header">
  <h1>InsightClass <span class="subtitle">训练结果查看器</span></h1>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">实验列表</div>
    <div class="exp-list" id="exp-list"></div>
  </div>
  <div class="main" id="main-content">
    <div class="empty-state" id="empty-state">请从左侧选择一个或多个实验</div>
  </div>
</div>

<script>
// ---- state ----
let allExperiments = [];
let selectedIds = new Set();
let lossChart = null;
let mapChart = null;

// ---- color palette ----
const COLORS = [
  '#38bdf8', '#f472b6', '#34d399', '#fbbf24', '#a78bfa',
  '#fb923c', '#22d3ee', '#e879f9', '#4ade80', '#f87171',
];

function getColor(i) { return COLORS[i % COLORS.length]; }

// ---- fetch experiments ----
async function loadExperiments() {
  const resp = await fetch('/api/experiments');
  allExperiments = await resp.json();
  renderSidebar();
}

function renderSidebar() {
  const el = document.getElementById('exp-list');
  if (!allExperiments.length) {
    el.innerHTML = '<div style="padding:16px;color:#64748b;font-size:13px;">未找到实验</div>';
    return;
  }
  el.innerHTML = allExperiments.map(exp => {
    const checked = selectedIds.has(exp.experiment_id) ? 'checked' : '';
    const selClass = selectedIds.has(exp.experiment_id) ? 'selected' : '';
    const mAP = exp.metrics?.mAP50_95 ?? exp.metrics?.['metrics/mAP50-95(B)'];
    const mAPStr = mAP != null ? `mAP50-95: ${Number(mAP).toFixed(3)}` : '';
    return `
      <label class="exp-item ${selClass}" data-id="${exp.experiment_id}">
        <input type="checkbox" ${checked} onchange="toggleExp('${exp.experiment_id}')">
        <div class="exp-info">
          <div class="exp-name">${exp.experiment_id}</div>
          <div class="exp-meta">${exp.model_weights} | ${mAPStr}</div>
        </div>
      </label>`;
  }).join('');
}

function toggleExp(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderSidebar();
  renderMain();
}

// ---- main render ----
async function renderMain() {
  const main = document.getElementById('main-content');
  const selected = allExperiments.filter(e => selectedIds.has(e.experiment_id));

  if (!selected.length) {
    main.innerHTML = '<div class="empty-state">请从左侧选择一个或多个实验</div>';
    return;
  }

  // Build HTML skeleton
  let html = '';

  // Info cards
  html += '<div class="cards-row" id="cards-row"></div>';

  // Hyperparameters (single experiment only)
  if (selected.length === 1) {
    html += `<div class="section" id="params-section">
      <div class="section-title">超参数</div>
      <div class="params-grid" id="params-grid"></div>
    </div>`;
  }

  // Training curves
  html += `<div class="section">
    <div class="section-title">训练曲线</div>
    <div class="chart-controls" id="chart-controls"></div>
    <div class="chart-container"><canvas id="loss-chart"></canvas></div>
    <div class="chart-container" style="margin-top:16px;"><canvas id="map-chart"></canvas></div>
  </div>`;

  // Official results plot
  html += `<div class="section" id="results-png-section">
    <div class="section-title">训练结果图 (Ultralytics)</div>
    <div class="cm-grid" id="results-png-grid"></div>
  </div>`;

  // Confusion matrix
  html += `<div class="section" id="cm-section">
    <div class="section-title">混淆矩阵</div>
    <div class="cm-grid" id="cm-grid"></div>
  </div>`;

  main.innerHTML = html;

  renderInfoCards(selected);
  if (selected.length === 1) renderParams(selected[0]);
  await renderCharts(selected);
  renderResultsPNG(selected);
  renderConfusionMatrices(selected);
}

// ---- info cards ----
function renderInfoCards(exps) {
  const el = document.getElementById('cards-row');
  el.innerHTML = exps.map((exp, i) => {
    const color = getColor(i);
    const mAP50 = exp.metrics?.mAP50 ?? exp.metrics?.['metrics/mAP50(B)'];
    const mAP5095 = exp.metrics?.mAP50_95 ?? exp.metrics?.['metrics/mAP50-95(B)'];
    const precision = exp.metrics?.precision ?? exp.metrics?.['metrics/precision(B)'];
    const recall = exp.metrics?.recall ?? exp.metrics?.['metrics/recall(B)'];
    const epochs = exp.hyperparameters?.epochs ?? '-';
    return `
      <div class="info-card" style="border-top: 3px solid ${color};">
        <div class="card-label">${exp.experiment_id}</div>
        <div class="card-value" style="color:${color}">${mAP5095 != null ? Number(mAP5095).toFixed(3) : '-'}</div>
        <div class="card-detail">mAP50-95</div>
        <div class="card-detail" style="margin-top:6px;">
          mAP50: ${mAP50 != null ? Number(mAP50).toFixed(3) : '-'} |
          P: ${precision != null ? Number(precision).toFixed(3) : '-'} |
          R: ${recall != null ? Number(recall).toFixed(3) : '-'}
        </div>
        <div class="card-detail">模型: ${exp.model_weights} | 轮次: ${epochs}</div>
      </div>`;
  }).join('');
}

// ---- hyperparameters ----
function renderParams(exp) {
  const grid = document.getElementById('params-grid');
  if (!grid) return;
  const hp = exp.hyperparameters || {};
  const entries = Object.entries(hp).filter(([k]) => k !== 'extra_args');
  if (hp.extra_args && typeof hp.extra_args === 'object') {
    for (const [k, v] of Object.entries(hp.extra_args)) {
      entries.push([k, v]);
    }
  }
  grid.innerHTML = entries.map(([k, v]) => `
    <div class="param-item">
      <span class="param-key">${k}</span>
      <span class="param-val">${typeof v === 'object' ? JSON.stringify(v) : v}</span>
    </div>`).join('');
}

// ---- charts ----
async function renderCharts(exps) {
  const allCSV = await Promise.all(exps.map(async (exp) => {
    if (!exp.has_results_csv) return null;
    const resp = await fetch(`/api/experiments/${exp.experiment_id}/results.csv`);
    if (!resp.ok) return null;
    return resp.json();
  }));

  // Find common columns
  const lossCols = ['train/box_loss', 'train/cls_loss', 'train/dfl_loss'];
  const mapCols = ['metrics/mAP50(B)', 'metrics/mAP50-95(B)'];

  // Build datasets
  const lossDatasets = [];
  const mapDatasets = [];

  exps.forEach((exp, i) => {
    const csvData = allCSV[i];
    if (!csvData) return;
    const epochs = csvData.rows.map(r => r.epoch);
    const color = getColor(i);

    lossCols.forEach((col, ci) => {
      const exists = csvData.columns.includes(col);
      if (!exists) return;
      const shades = [color, color + 'aa', color + '66'];
      lossDatasets.push({
        label: `${exp.experiment_id} - ${col}`,
        data: csvData.rows.map(r => parseFloat(r[col]) || null),
        borderColor: shades[ci],
        backgroundColor: shades[ci] + '22',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
      });
    });

    mapCols.forEach((col, ci) => {
      const exists = csvData.columns.includes(col);
      if (!exists) return;
      const shades = [color, color + 'bb'];
      mapDatasets.push({
        label: `${exp.experiment_id} - ${col}`,
        data: csvData.rows.map(r => parseFloat(r[col]) || null),
        borderColor: shades[ci],
        backgroundColor: shades[ci] + '22',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
      });
    });
  });

  const epochLabels = allCSV[0]?.rows?.map(r => r.epoch) || [];

  // Destroy old charts
  if (lossChart) { lossChart.destroy(); lossChart = null; }
  if (mapChart) { mapChart.destroy(); mapChart = null; }

  const gridColor = '#334155';
  const tickColor = '#64748b';
  const commonScales = {
    x: { ticks: { color: tickColor }, grid: { color: gridColor } },
    y: { ticks: { color: tickColor }, grid: { color: gridColor } },
  };

  // Loss chart
  const lossCtx = document.getElementById('loss-chart');
  if (lossCtx && lossDatasets.length) {
    lossChart = new Chart(lossCtx, {
      type: 'line',
      data: { labels: epochLabels, datasets: lossDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          title: { display: true, text: 'Loss', color: '#e2e8f0', font: { size: 14 } },
          legend: { labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } } },
        },
        scales: commonScales,
        interaction: { mode: 'index', intersect: false },
      },
    });
  }

  // mAP chart
  const mapCtx = document.getElementById('map-chart');
  if (mapCtx && mapDatasets.length) {
    mapChart = new Chart(mapCtx, {
      type: 'line',
      data: { labels: epochLabels, datasets: mapDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          title: { display: true, text: 'mAP', color: '#e2e8f0', font: { size: 14 } },
          legend: { labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } } },
        },
        scales: commonScales,
        interaction: { mode: 'index', intersect: false },
      },
    });
  }
}

// ---- results PNG ----
function renderResultsPNG(exps) {
  const grid = document.getElementById('results-png-grid');
  const filtered = exps.filter(e => e.has_results_png);
  if (!filtered.length) {
    document.getElementById('results-png-section').style.display = 'none';
    return;
  }
  grid.innerHTML = filtered.map(exp => `
    <div class="cm-card">
      <div class="cm-label">${exp.experiment_id}</div>
      <img src="/api/experiments/${exp.experiment_id}/results.png" alt="results">
    </div>`).join('');
}

// ---- confusion matrix ----
function renderConfusionMatrices(exps) {
  const grid = document.getElementById('cm-grid');
  const filtered = exps.filter(e => e.has_confusion_matrix);
  if (!filtered.length) {
    document.getElementById('cm-section').style.display = 'none';
    return;
  }
  grid.innerHTML = filtered.map(exp => `
    <div class="cm-card">
      <div class="cm-label">${exp.experiment_id}</div>
      <img src="/api/experiments/${exp.experiment_id}/confusion_matrix" alt="confusion matrix">
    </div>`).join('');
}

// ---- init ----
loadExperiments();
</script>
</body>
</html>
